<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client History</title>
    <link rel="icon" type="image/svg+xml" href="/assets/system-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
    <style>
      :root {
        --bg-a: #f2eae0;
        --bg-b: #b4d3d9;
        --surface: #f2eae0;
        --surface-soft: #b4d3d9;
        --surface-border: #bda6ce;
        --text-main: #2f2740;
        --text-soft: #5f5674;
        --peach: #9b8ec7;
        --cyan: #9b8ec7;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at 12% 20%, #f8f2ea 0%, transparent 42%),
          radial-gradient(circle at 84% 14%, #d7e9ee 0%, transparent 42%),
          linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
      }

      h1,
      h2,
      h3,
      button,
      select {
        font-family: 'Sora', sans-serif;
      }

      .panel {
        border: 1px solid var(--surface-border);
        background: linear-gradient(180deg, #f6efe7 0%, var(--surface) 100%);
        box-shadow: 0 18px 34px rgba(72, 62, 98, 0.18);
        animation: panelIn 420ms ease;
      }

      button,
      a,
      select {
        cursor: pointer;
      }

      button,
      a {
        transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.16s ease;
      }

      button:hover,
      a:hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
        box-shadow: 0 8px 18px rgba(5, 15, 30, 0.28);
      }

      .popup-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(47, 39, 64, 0.18);
        display: grid;
        place-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s ease;
        z-index: 50;
      }

      .popup-backdrop.show {
        opacity: 1;
        pointer-events: auto;
      }

      .popup-card {
        width: min(92vw, 360px);
        border-radius: 16px;
        border: 1px solid var(--surface-border);
        background: linear-gradient(180deg, #f6efe6 0%, #ebe0f0 100%);
        box-shadow: 0 14px 28px rgba(72, 62, 98, 0.2);
        padding: 16px;
        color: #3d3253;
      }

      .popup-title {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .popup-message {
        font-size: 0.94rem;
        color: #4f4268;
      }

      .history-card {
        animation: slideFadeIn 420ms ease both;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .history-card:hover {
        transform: translateY(-2px);
        border-color: #4c5d73;
        box-shadow: 0 14px 28px rgba(1, 8, 20, 0.35);
      }

      @keyframes panelIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideFadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="min-h-screen p-4 md:p-8">
    <main class="panel max-w-5xl mx-auto rounded-3xl p-5 md:p-8">
      <header class="mb-6 space-y-2">
        <p class="inline-flex rounded-full border px-3 py-1 text-xs font-semibold uppercase tracking-wide" style="border-color: var(--surface-border); background: #ebe3f0; color: var(--peach);">History Viewer</p>
        <h1 class="text-3xl md:text-4xl font-extrabold" style="color: var(--text-main);">Client History</h1>
        <p class="text-sm md:text-base" style="color: var(--text-soft);">Read-only list of all queued and completed clients.</p>
        <button id="backBtn" type="button" class="inline-flex items-center rounded-xl px-3 py-2 text-sm font-semibold" style="background: #ebe3f0; color: #4f4268; border: 1px solid var(--surface-border);">Back</button>
      </header>

      <section class="mb-4 grid grid-cols-1 md:grid-cols-3 gap-3">
        <div>
          <label for="statusFilter" class="block text-sm mb-1" style="color: var(--peach);">Status</label>
          <select id="statusFilter" class="w-full rounded-xl px-3 py-2.5" style="background: var(--surface-soft); border: 1px solid var(--surface-border); color: var(--text-main);">
            <option value="">All Status</option>
            <option value="waiting">Waiting</option>
            <option value="done">Done</option>
            <option value="expired">Expired (Day Reset)</option>
            </select>
        </div>
        <div class="flex items-end">
          <button id="refreshBtn" class="w-full rounded-xl px-3 py-2.5 text-sm font-semibold" style="background: var(--cyan); color: #241c35;">Refresh History</button>
        </div>
        <div class="grid grid-cols-2 gap-2 md:col-span-3">
          <select id="downloadFormat" class="rounded-xl px-3 py-2.5 text-sm" style="background: var(--surface-soft); border: 1px solid var(--surface-border); color: var(--text-main);">
            <option value="excel">Download as Excel</option>
            <option value="pdf">Download as PDF</option>
          </select>
          <button id="downloadBtn" class="rounded-xl px-3 py-2.5 text-sm font-semibold" style="background: #ebe3f0; color: #4f4268; border: 1px solid var(--surface-border);">Download Record</button>
        </div>
      </section>

      <p id="status" class="mb-4 text-sm" style="color: var(--text-soft);">Loading history...</p>

      <section id="historyList" class="space-y-3"></section>
    </main>

    <div id="errorPopup" class="popup-backdrop" aria-hidden="true" role="dialog" aria-label="Error alert">
      <div class="popup-card">
        <p class="popup-title">System Notice</p>
        <p id="errorPopupMessage" class="popup-message">Something went wrong.</p>
        <button id="errorPopupClose" type="button" class="mt-3 w-full rounded-xl px-3 py-2 text-sm font-semibold" style="background: #9b8ec7; color: #241c35;">Okay</button>
      </div>
    </div>

    <script>
      const historyList = document.getElementById('historyList');
      const statusEl = document.getElementById('status');
      const statusFilter = document.getElementById('statusFilter');
      const refreshBtn = document.getElementById('refreshBtn');
      const backBtn = document.getElementById('backBtn');
      const downloadFormat = document.getElementById('downloadFormat');
      const downloadBtn = document.getElementById('downloadBtn');
      const errorPopup = document.getElementById('errorPopup');
      const errorPopupMessage = document.getElementById('errorPopupMessage');
      const errorPopupClose = document.getElementById('errorPopupClose');
      const urlParams = new URLSearchParams(window.location.search);
      let activeAuth = null;
      let activeHistoryAgency = String(urlParams.get('agency') || '').toUpperCase();

      function showErrorPopup(message) {
        errorPopupMessage.textContent = message;
        errorPopup.classList.add('show');
        errorPopup.setAttribute('aria-hidden', 'false');
      }

      function hideErrorPopup() {
        errorPopup.classList.remove('show');
        errorPopup.setAttribute('aria-hidden', 'true');
      }

      errorPopupClose.addEventListener('click', hideErrorPopup);
      errorPopup.addEventListener('click', (event) => {
        if (event.target === errorPopup) {
          hideErrorPopup();
        }
      });

      async function ensureHistoryAuth() {
        const requestedAgency = String(urlParams.get('agency') || '').toUpperCase();
        const sessionUrl = requestedAgency
          ? `/api/auth/session?agency=${encodeURIComponent(requestedAgency)}`
          : '/api/auth/session';

        const response = await fetch(sessionUrl, {
          credentials: 'same-origin',
          cache: 'no-store',
        });

        if (!response.ok) {
          throw new Error('Unauthorized');
        }

        activeAuth = await response.json();
        sessionStorage.setItem(
          'officerAuth',
          JSON.stringify({
            agency: activeAuth.agency,
            username: activeAuth.username,
            loggedInAt: activeAuth.loggedInAt,
          })
        );

        activeHistoryAgency = String(activeAuth.agency || activeHistoryAgency || '').toUpperCase();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderEmpty(message) {
        historyList.innerHTML = `<div class="rounded-2xl border border-dashed p-8 text-center" style="border-color: var(--surface-border); background: #f7f1e8; color: var(--text-soft);">${escapeHtml(message)}</div>`;
      }

      function createTags(services) {
        return (services || [])
          .map(
            (service) =>
              `<span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold" style="background: #ebe3f0; color: var(--peach); border: 1px solid var(--surface-border);">${escapeHtml(service)}</span>`
          )
          .join(' ');
      }

      function formatAddress(client) {
        return [client.barangay, client.municipality, client.province].filter(Boolean).join(', ');
      }

      function getHistoryParams(limit = '200') {
        const params = new URLSearchParams();
        if (activeHistoryAgency === 'DMW' || activeHistoryAgency === 'OWWA') {
          params.set('agency', activeHistoryAgency);
        }
        if (statusFilter.value) params.set('status', statusFilter.value);
        params.set('limit', limit);
        return params;
      }

      async function fetchHistory(limit = '200') {
        const params = getHistoryParams(limit);
        const response = await fetch(`/api/clients?${params.toString()}`);
        if (!response.ok) {
          throw new Error('Failed to load history');
        }

        return response.json();
      }

      function getExportRows(clients) {
        return clients.map((client) => ({
          Ticket: client.ticket_id,
          Agency: client.agency,
          Status: client.status,
          AssignedTo: client.assigned_to || '',
          Name: client.client_identifier,
          Gender: client.gender || '',
          Address: formatAddress(client) || '',
          Services: (client.services || []).join(', '),
          Note: client.note || '',
          CreatedAt: client.created_at || '',
          CompletedAt: client.completed_at || '',
        }));
      }

      function getExportFilename(base, extension) {
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        return `${base}-${stamp}.${extension}`;
      }

      function downloadAsExcel(clients) {
        const rows = getExportRows(clients);
        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'History');
        XLSX.writeFile(workbook, getExportFilename('client-history', 'xlsx'));
      }

      function downloadAsPdf(clients) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape' });
        const bodyRows = getExportRows(clients).map((row) => [
          row.Ticket,
          row.Agency,
          row.Status,
          row.AssignedTo,
          row.Name,
          row.Gender,
          row.Address,
          row.Services,
          row.Note,
          row.CreatedAt,
          row.CompletedAt,
        ]);

        pdf.setFontSize(12);
        pdf.text('Client History Report', 14, 14);
        pdf.autoTable({
          head: [['Ticket', 'Agency', 'Status', 'Assigned To', 'Name', 'Gender', 'Address', 'Services', 'Note', 'Created At', 'Completed At']],
          body: bodyRows,
          startY: 20,
          styles: { fontSize: 8, cellPadding: 1.6 },
          headStyles: { fillColor: [155, 142, 199] },
        });

        pdf.save(getExportFilename('client-history', 'pdf'));
      }

      async function downloadHistory() {
        downloadBtn.disabled = true;

        try {
          statusEl.textContent = 'Preparing download...';
          statusEl.style.color = 'var(--text-soft)';

          const clients = await fetchHistory('1000');

          if (!clients.length) {
            statusEl.textContent = 'No records to download for selected filter.';
            return;
          }

          if (downloadFormat.value === 'pdf') {
            downloadAsPdf(clients);
          } else {
            downloadAsExcel(clients);
          }

          statusEl.textContent = `Download ready: ${clients.length} record(s).`;
          statusEl.style.color = '#2f5f4a';
        } catch (_error) {
          statusEl.textContent = 'Failed to prepare download.';
          statusEl.style.color = '#8a5a2b';
          showErrorPopup('Failed to prepare download.');
        } finally {
          downloadBtn.disabled = false;
        }
      }

      async function loadHistory() {
        statusEl.textContent = 'Loading history...';
        statusEl.style.color = 'var(--text-soft)';

        try {
          const clients = await fetchHistory('200');
          if (!clients.length) {
            renderEmpty('No client records found for selected filter.');
            statusEl.textContent = 'No records found.';
            return;
          }

          historyList.innerHTML = clients
            .map(
              (client, index) => `
                <article class="history-card rounded-2xl border p-4" style="border-color: var(--surface-border); background: #f7f1e8; animation-delay: ${Math.min(index * 35, 400)}ms;">
                  <div class="flex items-center justify-between gap-3">
                    <p class="text-sm font-semibold" style="color: var(--text-soft);">${escapeHtml(client.display_ticket || 'Ticket #' + client.ticket_id)} • ${escapeHtml(client.agency)}</p>
                    <span class="rounded-full px-2.5 py-1 text-xs font-semibold" style="
                      background: ${client.status === 'done' ? '#e5f0ea' : client.status === 'expired' ? '#f3e8d0' : '#ebe3f0'};
                      color: ${client.status === 'done' ? '#2f5f4a' : client.status === 'expired' ? '#7a4f1a' : '#4f4268'};
                      border: 1px solid ${client.status === 'done' ? '#9fc4b2' : client.status === 'expired' ? '#c9a06a' : 'var(--surface-border)'};
                    ">${escapeHtml(client.status)}</span>
                  </div>
                  <p class="mt-2 text-sm" style="color: var(--text-soft);"><span style="color: var(--peach);">Assigned To:</span> ${escapeHtml(client.assigned_to || 'Unassigned')}</p>
                  <p class="mt-2 text-lg font-bold" style="color: var(--text-main);">${escapeHtml(client.client_identifier)}</p>
                  <p class="mt-1 text-sm" style="color: var(--text-soft);">${escapeHtml(formatAddress(client) || 'No address')}</p>
                  <div class="mt-3 flex flex-wrap gap-2">${createTags(client.services)}</div>
                  ${client.note ? `<p class="mt-3 text-sm" style="color: var(--text-soft);"><span style="color: var(--peach);">Note:</span> ${escapeHtml(client.note)}</p>` : ''}
                </article>
              `
            )
            .join('');

          statusEl.textContent = `Showing ${clients.length} records.`;
        } catch (_error) {
          renderEmpty('Unable to load history right now.');
          statusEl.textContent = 'Failed to load history.';
          statusEl.style.color = '#8a5a2b';
          showErrorPopup('Failed to load history.');
        }
      }

      refreshBtn.addEventListener('click', loadHistory);
      statusFilter.addEventListener('change', loadHistory);
      downloadBtn.addEventListener('click', downloadHistory);
      backBtn.addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }

        window.location.href = '/index.html';
      });

      ensureHistoryAuth()
        .then(() => {
          loadHistory();
          setInterval(loadHistory, 5000);
        })
        .catch(() => {
          sessionStorage.removeItem('officerAuth');
          showErrorPopup('Session expired. Please log in again.');
          const fallbackAgency = String(urlParams.get('agency') || 'DMW').toUpperCase() === 'OWWA' ? 'OWWA' : 'DMW';
          const returnTo = encodeURIComponent(`${window.location.pathname}${window.location.search}`);
          window.location.replace(`/index.html?role=officer&agency=${fallbackAgency}&returnTo=${returnTo}`);
        });
    </script>
</body>
</html>
